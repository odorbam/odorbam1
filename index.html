<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>손그림 완벽 재현 도트 사슴 (마지막 그림 기준)</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f0f0; /* 배경색 */
            overflow: hidden;
            font-family: sans-serif;
        }

        #canvas-container {
            position: relative;
            text-align: center;
        }

        canvas {
            /* 도트 픽셀을 뭉개지지 않게 렌더링 */
            image-rendering: pixelated; 
            cursor: pointer;
            /* 손그림 느낌을 위해 그림자 효과 제거 */
            /* filter: drop-shadow(4px 4px 0px rgba(0,0,0,0.1)); */
            /* 기본 트랜지션 (갸웃, 넘어짐용) */
            transition: transform 0.1s ease; 
        }

        #instruction {
            position: absolute;
            bottom: -50px;
            width: 100%;
            color: #333;
            font-size: 18px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div id="canvas-container">
    <canvas id="deerCanvas"></canvas>
    <div id="instruction">사슴을 클릭해보세요! (최종)</div>
</div>
